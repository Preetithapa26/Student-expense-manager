name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ex_user
          POSTGRES_PASSWORD: ex_password
          POSTGRES_DB: ex_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ex_user -d ex_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DATABASE_URL: postgres://ex_user:ex_password@127.0.0.1:5432/ex_db

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm install

    - name: Start server & Connect Postgres
      run: |
        npm start &
        sleep 5
        curl -f http://localhost:3000/expenses || (echo "Server failed to start!" && exit 1)
